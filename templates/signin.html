<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        /* ============================
   BMW Premium Sign-In Page
============================ */
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #000, #0b0b0b 50%, #001f3f);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container */
        .signin-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Sign-in Box */
        .signin-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 35px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.3);
            animation: fadeIn 0.6s ease;
        }

        /* BMW Logo */
        .bmw-logo {
            width: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px rgba(0, 150, 255, 0.7));
        }

        /* Heading */
        .signin-box h1 {
            margin-bottom: 25px;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #00b4ff;
        }

        /* Inputs */
        .signin-box input {
            width: 100%;
            padding: 10px 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .signin-box input:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 150, 255, 0.5);
        }

        /* Button */
        .signin-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #007bff, #00b4ff);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 150, 255, 0.5);
            transition: all 0.3s ease;
        }

        .signin-btn:hover {
            box-shadow: 0 0 25px rgba(0, 150, 255, 0.9);
            transform: translateY(-2px);
        }

        /* Create account text */
        .signup-text {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #ccc;
        }

        .signup-text a {
            color: #00b4ff;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        /* Back link */
        .back-home {
            display: inline-block;
            margin-top: 25px;
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: #00b4ff;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Sign In</title>
    <link rel="stylesheet" href="signin.css">
</head>

<body>


    <div class="signin-container">
        <div class="signin-box">
            <img src="/static/images/logo.png" alt="BMW Logo" class="bmw-logo">

            <h1>Sign In to BMW</h1>
            <form id="signinForm">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="signin-btn">Sign In</button>
                <button class="signin-btn" id="logoutButton" style="display:none;">Logout</button>

            </form>

            <p class="signup-text">
                Don’t have an account? <a href="#">Create one</a>
            </p>

            <a href="index.html" class="back-home">← Back to Home</a>
        </div>
    </div>






    <script>
        document.getElementById("signinForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            // Simple demo login (you can replace with backend later)
            if (email && password) {
                const username = email.split("@")[0];
                localStorage.setItem("bmwUser", username);
                alert("Welcome, " + username + "!");
                window.location.href = "index.html";
            } else {
                alert("Please fill all fields.");
            }
        });
    </script>

</body>

</html>
